<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Professional Boxing Round Timer</title>

  <style>
    :root {
      --bg: #09090b;
      --panel: #18181b;
      --panel-2: #27272a;
      --text: #fafafa;
      --muted: #a1a1aa;
      --red: #ef4444;
      --blue: #3b82f6;
      --green: #22c55e;
      --yellow: #facc15;
      --orange: #fb923c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #27272a, var(--bg));
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }

    body.display-mode,
    body.overlay-mode {
      width: 100vw;
      height: 100vh;
      min-height: 100vh;
      overflow: hidden;
      padding: 0;
    }

    .app {
      width: min(1400px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.45fr 0.75fr;
      gap: 20px;
    }

    .timer-card,
    .settings-card,
    .history-card {
      background: rgba(24, 24, 27, 0.95);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.42);
      padding: 24px;
    }

    .timer-card {
      min-height: 720px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: center;
      overflow: hidden;
      position: relative;
    }
          justify-content: space-between;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    .sponsor-strip {
      min-height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      color: var(--muted);
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .sponsor-strip img {
      max-height: 135px;
      max-width: 620px;
      object-fit: contain;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 4.5rem);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: clamp(1rem, 1.8vw, 1.6rem);
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }

    .corners {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 16px;
      align-items: center;
      margin: 22px 0;
    }

    .corner {
      border-radius: 24px;
      padding: 18px;
      min-height: 116px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .red-corner {
      background: linear-gradient(
        135deg,
        rgba(239,68,68,.95),
        rgba(127,29,29,.9)
      );
    }

    .blue-corner {
      background: linear-gradient(
        135deg,
        rgba(59,130,246,.95),
        rgba(30,58,138,.9)
      );
    }

    .fighter-name {
      font-size: clamp(1.6rem, 3vw, 3rem);
      font-weight: 900;
      text-transform: uppercase;
      overflow-wrap: anywhere;
    }

    .time {
      font-size: clamp(6rem, 16vw, 15.5rem);
      font-weight: 950;
      line-height: 0.86;
      margin: 20px 0 8px;
      font-variant-numeric: tabular-nums;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin-top: 24px;
      position: sticky;
      bottom: 12px;
      z-index: 20;
      background: rgba(9,9,11,.88);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 22px;
      padding: 14px;
      backdrop-filter: blur(10px);
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 18px 24px;
      font-size: 1.08rem;
      font-weight: 850;
      cursor: pointer;
      color: white;
      background: #3f3f46;
    }

    .start { background: #22c55e; color: #052e16; }
    .pause { background: #facc15; color: #422006; }
    .reset { background: #ef4444; }
    .secondary { background: #52525b; }
    .orange { background: #fb923c; color: #431407; }

    input {
      width: 100%;
      border: 1px solid rgba(255,255,255,.1);
      background: #101014;
      color: white;
      border-radius: 13px;
      padding: 12px;
      font-size: .98rem;
    }
  </style>
</head>
<body>
  <main class="app">

  <section class="timer-card" id="timerCard">

    <div>
      <div class="sponsor-strip" id="sponsorStrip">
        Main Sponsor
      </div>

      <h1 id="eventTitle">Fight Night</h1>
      <div class="subtitle" id="boutTitle">Main Event</div>

      <div class="corners">
        <div class="corner red-corner">
          <div>Red Corner</div>
          <div class="fighter-name" id="redNameDisplay">
            Red Fighter
          </div>
        </div>

        <div>VS</div>

        <div class="corner blue-corner">
          <div>Blue Corner</div>
          <div class="fighter-name" id="blueNameDisplay">
            Blue Fighter
          </div>
        </div>
      </div>

      <div id="statusText">Ready</div>
      <div class="time" id="timeDisplay">03:00</div>
    </div>

    <div class="controls">
      <button class="secondary" id="scoreWindowBtn">
        Open Scoring Window
      </button>

      <button class="start" id="startBtn">
        Start
      </button>

      <button class="pause" id="pauseBtn">
        Pause
      </button>

      <button class="secondary" id="skipBtn">
        Skip Phase
      </button>

      <button class="reset" id="resetBtn">
        Reset
      </button>

      <button class="secondary" id="outputBtn">
        Open Output Window
      </button>
    </div>

  </section>

  <aside>

    <div class="settings-card">

      <h2>Event Settings</h2>

      <label>Red Corner</label>
      <input id="redInput" value="Red Fighter" />

      <label>Blue Corner</label>
      <input id="blueInput" value="Blue Fighter" />

      <label>Rounds</label>
      <input id="roundsInput" value="12" />

      <label>Round Time</label>
      <input id="roundTimeInput" value="3:00" />

      <label>Rest Time</label>
      <input id="restTimeInput" value="1:00" />

      <h2 style="margin-top:30px;">
        Walkout Music
      </h2>

      <label>Red Spotify Link</label>
      <input
        id="redSpotifyInput"
        placeholder="spotify track link"
      />

      <button
        class="start"
        id="playRedMusicBtn"
        style="margin-top:10px;"
      >
        Play Red Walkout
      </button>

      <label style="margin-top:20px;">
        Blue Spotify Link
      </label>

      <input
        id="blueSpotifyInput"
        placeholder="spotify track link"
      />

      <button
        class="start"
        id="playBlueMusicBtn"
        style="margin-top:10px;"
      >
        Play Blue Walkout
      </button>

    </div>

  </aside>

</main>
  <audio id="startBell" src="bell 1.wav" preload="auto"></audio>
<audio id="endBell" src="bell 3.wav" preload="auto"></audio>

<script>
const $ = (id) => document.getElementById(id);

let running = false;
let round = 1;
let phase = "round";
let timeLeft = 180;
let timer = null;

function parseTime(value) {
  const parts = value.split(":").map(Number);

  if (parts.length === 2) {
    return (parts[0] * 60) + parts[1];
  }

  return Number(value) || 0;
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;

  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

function playStartBell() {
  const bell = $("startBell");
  bell.currentTime = 0;
  bell.play();
}

function playEndBell() {
  const bell = $("endBell");
  bell.currentTime = 0;
  bell.play();
}

function render() {
  $("redNameDisplay").textContent =
    $("redInput").value || "Red Fighter";

  $("blueNameDisplay").textContent =
    $("blueInput").value || "Blue Fighter";

  $("timeDisplay").textContent =
    formatTime(timeLeft);

  $("statusText").textContent =
    running ? `Round ${round}` : "Stopped";
}
  function startTimer() {
  if (running) return;

  if (
    phase === "round" &&
    timeLeft === parseTime($("roundTimeInput").value)
  ) {
    playStartBell();
  }

  running = true;
  render();

  timer = setInterval(() => {
    timeLeft--;

    if (timeLeft <= 0) {
      nextPhase();
    }

    render();
  }, 1000);
}

function pauseTimer() {
  running = false;
  clearInterval(timer);
  render();
}

function resetTimer() {
  clearInterval(timer);
  running = false;
  round = 1;
  phase = "round";
  timeLeft = parseTime(
    $("roundTimeInput").value
  );

  render();
}

function nextPhase() {
  playEndBell();

  clearInterval(timer);
  running = false;

  const totalRounds =
    Number($("roundsInput").value) || 12;

  if (round >= totalRounds) {
    $("statusText").textContent =
      "Fight Complete";
    return;
  }

  round++;
  timeLeft = parseTime(
    $("roundTimeInput").value
  );

  render();
}

function openSpotify(link) {
  if (!link) return;

  window.open(link, "_blank");
}

function playRedWalkout() {
  const link = $("redSpotifyInput").value.trim();

  if (!link) return;

  openSpotify(link);
}

function playBlueWalkout() {
  const link = $("blueSpotifyInput").value.trim();

  if (!link) return;

  openSpotify(link);
}
  $("startBtn").addEventListener(
  "click",
  startTimer
);

$("pauseBtn").addEventListener(
  "click",
  pauseTimer
);

$("resetBtn").addEventListener(
  "click",
  resetTimer
);

$("skipBtn").addEventListener(
  "click",
  nextPhase
);

$("playRedMusicBtn").addEventListener(
  "click",
  playRedWalkout
);

$("playBlueMusicBtn").addEventListener(
  "click",
  playBlueWalkout
);

$("outputBtn").addEventListener(
  "click",
  () => {
    window.open(
      window.location.pathname + "?output=1",
      "_blank"
    );
  }
);

$("scoreWindowBtn").addEventListener(
  "click",
  () => {
    window.open(
      window.location.pathname + "?scores=1",
      "_blank"
    );
  }
);

resetTimer();

</script>
</body>
</html>
